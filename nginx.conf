server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/public;
    index index.php index.html;

    server_name _;

    # 1. VueJS Frontend (Static Assets & Client Routing)
    location / {
        alias /var/www/public/frontend/;
        try_files $uri $uri/ /index.html;
    }

    # 2. VueJS Static files fallback (js, css, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/public/frontend;
        try_files $uri =404;
    }

    # 3. Laravel API and Routes
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000; # PHP-FPM default port
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # 4. Python Voice Server WebSockets
    location /ws {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
